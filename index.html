        @keyframes pageEnter { from { opacity: 0; transform: scale(0.99) translateY(5px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

export default function App() {
  // --- STATE ---
  const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
  const [selectedOutletCode, setSelectedOutletCode] = useState('ALL');
  const [selectedCategory, setSelectedCategory] = useState('ALL');
  const [selectedBrand, setSelectedBrand] = useState('ALL');
  const [selectedArticle, setSelectedArticle] = useState('ALL'); 

  const [salesData, setSalesData] = useState([]);
  const [isLoadingData, setIsLoadingData] = useState(false);
  const [syncError, setSyncError] = useState(null);
  const [isAddOpen, setIsAddOpen] = useState(false);
  const [lastSync, setLastSync] = useState(null);
  
  const [newSale, setNewSale] = useState({
    date: selectedDate, outletCode: '', category: '', brand: '', article: '', qty: ''
  });

  // --- FETCH DATA ---
  const fetchSheetData = async () => {
    const cleanUrl = GOOGLE_SCRIPT_URL.trim();
    if (!cleanUrl || !cleanUrl.includes('/exec')) {
      setSyncError("Incorrect URL detected. Please ensure you use the WEB APP URL (ending in /exec) from the Deploy menu.");
      return;
    }

    setIsLoadingData(true);
    setSyncError(null);
    
    try {
      const url = `${cleanUrl}?t=${Date.now()}`;
      const response = await fetch(url, { 
        method: 'GET',
        redirect: 'follow'
      });
      
      if (!response.ok) {
        throw new Error(`Connection Error: ${response.status}`);
      }
      
      const data = await response.json();
      
      if (Array.isArray(data)) {
        setSalesData(data);
        setLastSync(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
      } else if (data && data.status === 'error') {
        throw new Error(data.message);
      }
    } catch (error) {
      console.error("Fetch Error:", error);
      setSyncError(error.message === 'Failed to fetch' 
        ? "Browser Blocked Connection. Usually a CORS/Security issue." 
        : error.message
      );
    } finally {
      setIsLoadingData(false);
    }
  };

  useEffect(() => {
    fetchSheetData();
  }, []);

  // --- COMPUTED VALUES ---
  const categories = useMemo(() => [...new Set(productMasterList.map(p => p.category))], []);
  
  const brands = useMemo(() => {
    return [...new Set(productMasterList
      .filter(p => selectedCategory === 'ALL' || p.category === selectedCategory)
      .map(p => p.brand)
    )].sort();
  }, [selectedCategory]);

  const availableProducts = useMemo(() => {
    return productMasterList.filter(p => 
      (selectedCategory === 'ALL' || p.category === selectedCategory) &&
      (selectedBrand === 'ALL' || p.brand === selectedBrand)
    );
  }, [selectedCategory, selectedBrand]);

  const monthlyTotalValue = useMemo(() => {
    if (!selectedDate) return 0;
    const yearMonth = selectedDate.substring(0, 7); 
    
    return salesData.reduce((total, item) => {
      if (!item.date || typeof item.date !== 'string') return total;
      const itemYearMonth = item.date.substring(0, 7);
      if (itemYearMonth === yearMonth) {
        const matchesOutlet = selectedOutletCode === 'ALL' || String(item.outletCode) === selectedOutletCode;
        if (matchesOutlet) {
          const product = productMasterList.find(p => p.article === String(item.article));
          const mrp = product ? product.mrp : 0;
          return total + (Number(item.qty || 0) * mrp);
        }
      }
      return total;
    }, 0);
  }, [salesData, selectedDate, selectedOutletCode]);

  const currentTarget = useMemo(() => {
    if (selectedOutletCode === 'ALL') {
      return outletMasterList.reduce((sum, outlet) => sum + outlet.target, 0);
    }
    const outlet = outletMasterList.find(o => o.code === selectedOutletCode);
    return outlet ? outlet.target : 0;
  }, [selectedOutletCode]);

  const achievementPercent = currentTarget > 0 ? ((monthlyTotalValue / currentTarget) * 100).toFixed(1) : 0;
  const balance = currentTarget - monthlyTotalValue;

  const groupedData = useMemo(() => {
    const filtered = salesData.filter(item => {
      const product = productMasterList.find(p => p.article === String(item.article));
      if (!product) return false;

      const matchesDate = item.date === selectedDate;
      const matchesOutlet = selectedOutletCode === 'ALL' || String(item.outletCode) === selectedOutletCode;
      const matchesCategory = selectedCategory === 'ALL' || product.category === selectedCategory;
      const matchesBrand = selectedBrand === 'ALL' || product.brand === selectedBrand;
      const matchesArticle = selectedArticle === 'ALL' || String(item.article) === selectedArticle;
      
      return matchesDate && matchesOutlet && matchesCategory && matchesBrand && matchesArticle;
    });
    
    return filtered.reduce((acc, item) => {
      const product = productMasterList.find(p => p.article === String(item.article));
      const brand = product.brand;
      const itemValue = Number(item.qty || 0) * (product.mrp || 0);
      
      if (!acc[brand]) {
        acc[brand] = { totalQty: 0, totalValue: 0, items: [] };
      }
      acc[brand].items.push({ 
        keyId: `${item.date}-${item.article}-${Math.random()}`, 
        ...item, 
        product, 
        itemValue 
      });
      acc[brand].totalQty += Number(item.qty || 0);
      acc[brand].totalValue += itemValue;
      return acc;
    }, {});
  }, [salesData, selectedDate, selectedOutletCode, selectedCategory, selectedBrand, selectedArticle]);

  // Form Cascading
  const formBrands = useMemo(() => {
    if (!newSale.category) return [];
    return [...new Set(productMasterList.filter(p => p.category === newSale.category).map(p => p.brand))].sort();
  }, [newSale.category]);

  const formProducts = useMemo(() => {
    if (!newSale.brand) return [];
    return productMasterList.filter(p => p.category === newSale.category && p.brand === newSale.brand);
  }, [newSale.category, newSale.brand]);

  // --- ACTIONS ---
  const handleAddSale = async (e) => {
    e.preventDefault();
    if (!newSale.date || !newSale.outletCode || !newSale.article || !newSale.qty || newSale.qty <= 0) return;

    const selectedOutletName = outletMasterList.find(o => o.code === newSale.outletCode)?.name || '';
    const selectedProduct = productMasterList.find(p => p.article === newSale.article);
    const selectedProductName = selectedProduct?.description || '';
    const selectedProductMRP = selectedProduct?.mrp || 0;
    const qtyInt = parseInt(newSale.qty, 10);
    
    const sheetPayload = {
      date: newSale.date,
      outletCode: newSale.outletCode,
      outletName: selectedOutletName,
      category: newSale.category,
      brand: newSale.brand,
      productCode: newSale.article,
      productName: selectedProductName,
      qty: qtyInt,
      saleValue: qtyInt * selectedProductMRP
    };

    setSalesData(prev => [...prev, {
      date: sheetPayload.date,
      outletCode: sheetPayload.outletCode,
      article: sheetPayload.productCode,
      qty: sheetPayload.qty
    }]);

    try {
      await fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(sheetPayload)
      });
    } catch (err) {
      console.error("Submit Error:", err);
    }

    setNewSale(prev => ({ ...prev, article: '', qty: '' }));
    setIsAddOpen(false);
  };

  const handleExportCSV = () => {
    const headers = ['Date', 'Outlet Code', 'Outlet Name', 'Category', 'Brand', 'Product Code', 'Product Name', 'MRP', 'Sold Qty', 'Total Value'];
    const rows = salesData.map(item => {
      const outlet = outletMasterList.find(o => o.code === String(item.outletCode));
      const product = productMasterList.find(p => p.article === String(item.article));
      const mrp = product ? product.mrp : 0;
      return [
        item.date, item.outletCode, outlet ? outlet.name : 'Unknown',
        product ? product.category : 'Unknown', product ? product.brand : 'Unknown',
        item.article, product ? product.description : 'Unknown', mrp, item.qty, Number(item.qty || 0) * mrp
      ].map(cell => `"${cell}"`).join(','); 
    });
    const csvContent = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `Sales_Summary_${new Date().toISOString().split('T')[0]}.csv`;
    link.click();
  };

  return (
    <div className="min-h-screen bg-gray-100 flex justify-center font-sans text-gray-900">
      {/* Container uses 100dvh (dynamic viewport height) so mobile bottom bars don't cover the entry button */}
      <div className="w-full max-w-md bg-gray-50 flex flex-col shadow-2xl relative h-[100dvh] overflow-hidden">
        
        {/* Header - Clean Modern Theme */}
        <header className="bg-white border-b border-gray-200 px-5 pt-8 pb-4 sticky top-0 z-10 shrink-0">
          <div className="flex items-center justify-between mb-5">
            <div>
              <h1 className="text-xl font-bold tracking-tight text-gray-900 flex items-center gap-2">
                <BarChart3 className="text-indigo-600" size={24} />
                Sales Dashboard
              </h1>
              <div className="flex items-center gap-1.5 mt-1">
                {lastSync ? (
                  <CheckCircle2 size={14} className="text-emerald-500" />
                ) : (
                  <div className="w-2 h-2 rounded-full bg-indigo-500 animate-pulse ml-0.5"></div>
                )}
                <p className="text-gray-500 text-xs font-medium">
                  {lastSync ? `Updated ${lastSync}` : 'Syncing data...'}
                </p>
              </div>
            </div>
            <div className="flex gap-2">
              <button onClick={fetchSheetData} className="p-2 text-gray-600 bg-gray-100 rounded-full hover:bg-gray-200 hover:text-gray-900 transition-colors active:scale-95">
                <RefreshCw size={18} className={`${isLoadingData ? 'animate-spin' : ''}`} />
              </button>
              <button onClick={handleExportCSV} className="p-2 text-gray-600 bg-gray-100 rounded-full hover:bg-gray-200 hover:text-gray-900 transition-colors active:scale-95">
                <Download size={18} />
              </button>
            </div>
          </div>

          <div className="flex gap-3 mb-4">
            <div className="relative flex-1">
              <Calendar size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none" />
              <input type="date" value={selectedDate} onChange={(e) => setSelectedDate(e.target.value)}
                className="w-full bg-gray-50 border border-gray-200 text-gray-800 pl-9 pr-3 py-2.5 rounded-xl text-sm font-medium focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" />
            </div>
            <div className="relative flex-1">
              <Store size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none" />
              <select value={selectedOutletCode} onChange={(e) => setSelectedOutletCode(e.target.value)}
                className="w-full bg-gray-50 border border-gray-200 text-gray-800 pl-9 pr-8 py-2.5 rounded-xl text-sm font-medium focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none appearance-none transition-all truncate">
                <option value="ALL">All Outlets</option>
                {outletMasterList.map(o => <option key={o.code} value={o.code}>{o.name}</option>)}
              </select>
              <ChevronRight size={16} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none rotate-90" />
            </div>
          </div>

          <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
            <select value={selectedCategory} onChange={(e) => {setSelectedCategory(e.target.value); setSelectedBrand('ALL'); setSelectedArticle('ALL');}}
              className="bg-white border border-gray-200 text-gray-700 px-4 py-1.5 rounded-full text-xs font-semibold outline-none hover:border-indigo-300 transition-colors cursor-pointer appearance-none">
              <option value="ALL">All Categories</option>
              {categories.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
            <select value={selectedBrand} onChange={(e) => {setSelectedBrand(e.target.value); setSelectedArticle('ALL');}}
              className="bg-white border border-gray-200 text-gray-700 px-4 py-1.5 rounded-full text-xs font-semibold outline-none hover:border-indigo-300 transition-colors cursor-pointer appearance-none">
              <option value="ALL">All Brands</option>
              {brands.map(b => <option key={b} value={b}>{b}</option>)}
            </select>
          </div>
        </header>

        {/* Scrollable Main Content - Padding bottom increased to avoid the fixed bar */}
        <main className="flex-1 overflow-y-auto p-5 pb-24 relative">
          
          {isLoadingData && (
            <div className="absolute inset-0 bg-gray-50/70 backdrop-blur-sm flex items-center justify-center z-10">
              <div className="bg-white px-6 py-4 rounded-2xl shadow-xl flex items-center gap-3 border border-gray-100">
                <RefreshCw size={24} className="text-indigo-600 animate-spin" />
                <span className="text-sm font-semibold text-gray-700">Syncing...</span>
              </div>
            </div>
          )}

          {/* Error Message */}
          {syncError && (
            <div className="bg-red-50 border border-red-200 text-red-800 p-4 rounded-2xl mb-6 shadow-sm">
              <div className="flex items-center gap-2 mb-2 font-bold text-sm text-red-700">
                <AlertCircle size={18} /> Connection Error
              </div>
              <p className="text-xs font-medium mb-3 opacity-90">{syncError}</p>
              <div className="pt-3 border-t border-red-200/60">
                <div className="flex items-center gap-1.5 text-xs font-bold text-red-700 mb-2">
                  <Info size={14} /> Troubleshooting
                </div>
                <ul className="text-xs space-y-1.5 text-red-700/80 mb-3">
                  <li>• Use "Web App URL" (from Deploy), not the Editor URL.</li>
                  <li>• Set "Who has access" to "Anyone".</li>
                  <li>• Choose "New Version" when updating script.</li>
                </ul>
                <button onClick={fetchSheetData} className="bg-white text-red-700 px-4 py-2 rounded-lg text-xs font-bold shadow-sm hover:bg-red-50 active:scale-95 transition-all">Retry Connection</button>
              </div>
            </div>
          )}

          {/* Detailed Metric Card (Target, Achieved, Balance) */}
          <div className="bg-gradient-to-br from-indigo-600 to-blue-700 p-5 rounded-2xl mb-8 shadow-lg shadow-indigo-200 text-white relative overflow-hidden">
            <div className="absolute right-0 top-0 opacity-10 translate-x-1/4 -translate-y-1/4 pointer-events-none">
              <TrendingUp size={120} />
            </div>

            <div className="relative z-10 flex justify-between items-start mb-4">
              <div>
                <span className="text-indigo-200 text-[10px] font-bold uppercase tracking-wider mb-1 block">Sales Achieved (MTD)</span>
                <div className="flex items-center gap-1.5 text-indigo-50 mb-1">
                  <Store size={14} />
                  <span className="text-sm font-semibold truncate max-w-[140px]">
                    {selectedOutletCode === 'ALL' ? 'All Outlets' : outletMasterList.find(o => o.code === selectedOutletCode)?.name}
                  </span>
                </div>
              </div>
              <div className="text-right">
                <span className="text-3xl font-bold tracking-tight block">৳{monthlyTotalValue.toLocaleString()}</span>
              </div>
            </div>

            {/* Progress Bar */}
            <div className="relative z-10 mb-4">
              <div className="flex justify-between items-end text-xs font-semibold mb-1.5 text-indigo-100">
                <span>Achieved: <span className="text-white text-sm">{achievementPercent}%</span></span>
                <span>Target: ৳{currentTarget.toLocaleString()}</span>
              </div>
              <div className="w-full bg-indigo-900/40 rounded-full h-2.5 overflow-hidden shadow-inner">
                <div
                  className={`h-2.5 rounded-full transition-all duration-700 ease-out ${balance <= 0 ? 'bg-emerald-400' : 'bg-blue-300'}`}
                  style={{ width: `${Math.min(achievementPercent, 100)}%` }}
                ></div>
              </div>
            </div>

            {/* Balance */}
            <div className="relative z-10 pt-3 border-t border-indigo-400/30 flex justify-between items-center">
              <div>
                 <span className="text-indigo-200 text-[10px] font-bold uppercase tracking-wider block mb-0.5">Balance to Target</span>
                 <span className={`text-sm font-bold ${balance <= 0 ? 'text-emerald-300' : 'text-white'}`}>
                   {balance <= 0 ? 'Target Reached 🎉' : `৳${balance.toLocaleString()}`}
                 </span>
              </div>
            </div>
          </div>

          <h3 className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-4 px-1">
            Daily Breakdown
          </h3>

          {Object.keys(groupedData).length > 0 ? (
            <div className="space-y-5">
              {Object.entries(groupedData).map(([brand, data]) => (
                <div key={brand} className="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm">
                  <div className="bg-gray-50/80 px-4 py-3 flex justify-between items-center border-b border-gray-100">
                    <span className="text-sm font-bold text-gray-800">{brand}</span>
                    <span className="text-xs font-bold text-indigo-700 bg-indigo-50 px-2.5 py-1 rounded-md">
                      ৳{data.totalValue.toLocaleString()}
                    </span>
                  </div>
                  <div className="divide-y divide-gray-100">
                    {data.items.map((item) => (
                      <div key={item.keyId} className="p-4 flex items-center justify-between gap-3 hover:bg-gray-50/50 transition-colors">
                        <div className="bg-gray-100 p-2.5 rounded-xl text-gray-500 shrink-0">
                          <ShoppingBag size={18} />
                        </div>
                        <div className="flex-1 min-w-0">
                          <p className="text-sm font-semibold text-gray-900 truncate mb-0.5" title={item.product.description}>
                            {item.product.description}
                          </p>
                          <div className="flex items-center text-xs text-gray-500 font-medium">
                            <span>MRP: ৳{item.product.mrp}</span>
                            <span className="mx-1.5 text-gray-300">•</span>
                            <span>{item.qty} Pcs</span>
                          </div>
                        </div>
                        <div className="text-right shrink-0">
                          <p className="text-sm font-bold text-gray-900">৳{item.itemValue.toLocaleString()}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <div className="flex flex-col items-center justify-center py-16 text-gray-400">
              <Package size={48} strokeWidth={1.5} className="mb-4 text-gray-300" />
              <p className="text-sm font-medium">No sales recorded for this criteria.</p>
            </div>
          )}
        </main>

        {/* Fixed Bottom Action Bar */}
        <div className="absolute bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-md border-t border-gray-200 z-20 shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
          <button onClick={() => {
              setNewSale({ ...newSale, date: selectedDate, outletCode: selectedOutletCode === 'ALL' ? '' : selectedOutletCode, category: '', brand: '', article: '', qty: '' });
              setIsAddOpen(true);
            }}
            className="w-full bg-indigo-600 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-indigo-200 flex items-center justify-center gap-2 hover:bg-indigo-700 active:scale-[0.98] transition-all text-sm">
            <Plus size={20} strokeWidth={3} />
            Record New Sale
          </button>
        </div>

        {/* ENTRY MODAL - Clean Bottom Sheet */}
        {isAddOpen && (
          <div className="absolute inset-0 z-50 flex flex-col justify-end">
            <div className="absolute inset-0 bg-gray-900/40 backdrop-blur-sm transition-opacity animate-in fade-in" onClick={() => setIsAddOpen(false)}></div>
            <div className="bg-white w-full rounded-t-[2rem] p-6 pt-5 shadow-2xl relative z-10 max-h-[90dvh] overflow-y-auto animate-in slide-in-from-bottom-8 duration-300">
              
              {/* Drag Handle Indicator */}
              <div className="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-5"></div>

              <div className="flex justify-between items-center mb-6">
                <h2 className="text-xl font-bold text-gray-900">Record New Sale</h2>
                <button onClick={() => setIsAddOpen(false)} className="p-2 text-gray-400 hover:text-gray-700 hover:bg-gray-100 rounded-full transition-colors">
                   <X size={20}/>
                </button>
              </div>

              <form onSubmit={handleAddSale} className="space-y-4 pb-8">
                <div className="grid grid-cols-2 gap-3">
                  <div className="space-y-1.5">
                    <label className="text-xs font-semibold text-gray-600 ml-1">Date</label>
                    <input type="date" required value={newSale.date} onChange={(e) => {setNewSale({...newSale, date: e.target.value}); setSelectedDate(e.target.value);}}
                      className="w-full bg-gray-50 border border-gray-200 px-4 py-3 rounded-xl text-sm font-medium text-gray-900 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" />
                  </div>
                  <div className="space-y-1.5">
                    <label className="text-xs font-semibold text-gray-600 ml-1">Outlet</label>
                    <select required value={newSale.outletCode} onChange={(e) => {setNewSale({...newSale, outletCode: e.target.value}); setSelectedOutletCode(e.target.value);}}
                      className="w-full bg-gray-50 border border-gray-200 px-4 py-3 rounded-xl text-sm font-medium text-gray-900 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none appearance-none transition-all">
                      <option value="" disabled>Select Outlet</option>
                      {outletMasterList.map(o => <option key={o.code} value={o.code}>{o.name}</option>)}
                    </select>
                  </div>
                </div>

                <div className="space-y-1.5">
                  <label className="text-xs font-semibold text-gray-600 ml-1">Category</label>
                  <select required value={newSale.category} onChange={(e) => setNewSale({...newSale, category: e.target.value, brand: '', article: ''})}
                    className="w-full bg-gray-50 border border-gray-200 px-4 py-3 rounded-xl text-sm font-medium text-gray-900 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none appearance-none transition-all">
                    <option value="" disabled>Choose Category</option>
                    {categories.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>

                <div className="space-y-1.5">
                  <label className="text-xs font-semibold text-gray-600 ml-1">Brand</label>
                  <select required disabled={!newSale.category} value={newSale.brand} onChange={(e) => setNewSale({...newSale, brand: e.target.value, article: ''})}
                    className="w-full bg-gray-50 border border-gray-200 px-4 py-3 rounded-xl text-sm font-medium text-gray-900 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none appearance-none disabled:opacity-60 transition-all">
                    <option value="" disabled>Choose Brand</option>
                    {formBrands.map(b => <option key={b} value={b}>{b}</option>)}
                  </select>
                </div>

                <div className="space-y-1.5">
                  <label className="text-xs font-semibold text-gray-600 ml-1">Product (SKU)</label>
                  <select required disabled={!newSale.brand} value={newSale.article} onChange={(e) => setNewSale({...newSale, article: e.target.value})}
                    className="w-full bg-gray-50 border border-gray-200 px-4 py-3 rounded-xl text-sm font-medium text-gray-900 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none appearance-none disabled:opacity-60 transition-all">
                    <option value="" disabled>Select Product...</option>
                    {formProducts.map(p => <option key={p.article} value={p.article}>{p.description} (৳{p.mrp})</option>)}
                  </select>
                </div>

                {/* Updated Quantity Entry with Up/Down buttons */}
                <div className="space-y-1.5 pt-2">
                  <label className="text-xs font-bold text-gray-500 uppercase tracking-wider block text-center mb-2">Quantity Sold</label>
                  <div className="flex items-center gap-3">
                    <button type="button" 
                      onClick={() => setNewSale(prev => ({...prev, qty: Math.max(1, (parseInt(prev.qty) || 1) - 1)}))}
                      className="w-14 h-14 shrink-0 rounded-2xl bg-gray-100 text-gray-600 flex items-center justify-center hover:bg-gray-200 active:scale-95 transition-all border border-gray-200">
                      <Minus size={24} strokeWidth={3} />
                    </button>
                    
                    <input type="number" required min="1" value={newSale.qty} 
                      onChange={(e) => setNewSale({...newSale, qty: e.target.value})} 
                      placeholder="0"
                      className="w-full flex-1 bg-gray-50 border border-gray-200 py-4 rounded-2xl text-3xl font-bold text-center text-indigo-900 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder:text-gray-300" />
                      
                    <button type="button" 
                      onClick={() => setNewSale(prev => ({...prev, qty: (parseInt(prev.qty) || 0) + 1}))}
                      className="w-14 h-14 shrink-0 rounded-2xl bg-indigo-50 text-indigo-600 flex items-center justify-center hover:bg-indigo-100 active:scale-95 transition-all border border-indigo-100">
                      <Plus size={24} strokeWidth={3} />
                    </button>
                  </div>
                </div>

                <button type="submit" className="w-full bg-indigo-600 text-white font-semibold py-4 rounded-xl shadow-md shadow-indigo-200 flex items-center justify-center gap-2 mt-6 hover:bg-indigo-700 active:scale-[0.98] transition-all text-sm">
                  <Save size={18} />
                  Save Transaction
                </button>
              </form>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
        // --- YOUR CODE ENDS HERE ---

        // Render the component to the DOM
        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
